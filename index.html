<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>קניין 2.0 — לימוד דיני קניין</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#1a1a2e;--parchment:#f7f4ef;--gold:#b8860b;--gold-light:#e8d5a3;--gold-pale:#fdf6e3;--border:#ddd5c4;--sidebar-bg:#1a1a2e;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Assistant',sans-serif;background:var(--parchment);color:var(--ink);direction:rtl;}
    #app{display:flex;min-height:100vh;}
    /* Sidebar */
    #sidebar{background:var(--sidebar-bg);width:272px;min-height:100vh;flex-shrink:0;display:flex;flex-direction:column;}
    .logo-area{border-bottom:1px solid rgba(184,134,11,0.3);padding:22px 20px 18px;}
    .logo-title{font-family:'Frank Ruhl Libre',serif;font-size:1.4rem;font-weight:900;color:#fde68a;}
    .logo-sub{font-size:0.72rem;color:#9ca3af;margin-top:3px;}
    .prog-label{font-size:0.67rem;color:#6b7280;margin-bottom:5px;margin-top:13px;}
    .prog-wrap{background:#374151;border-radius:4px;height:5px;overflow:hidden;}
    .prog-fill{height:100%;background:var(--gold);border-radius:4px;width:40%;}
    .prog-info{font-size:0.67rem;color:#9ca3af;margin-top:4px;}
    .nav-sec-lbl{font-size:0.63rem;font-weight:700;color:#4b5563;text-transform:uppercase;letter-spacing:0.1em;padding:10px 20px 3px;}
    .nav-item{display:flex;align-items:flex-start;gap:11px;padding:13px 20px;cursor:pointer;border-right:3px solid transparent;transition:all .18s;color:#9ca3af;}
    .nav-item:hover{background:rgba(255,255,255,0.06);color:#e5e7eb;}
    .nav-item.active{background:rgba(184,134,11,0.15);border-right-color:var(--gold);color:#fde68a;}
    .nav-icon{font-size:1.15rem;flex-shrink:0;margin-top:1px;}
    .nav-txt{flex:1;}
    .nav-label{font-size:0.82rem;font-weight:600;line-height:1.3;}
    .nav-sub{font-size:0.7rem;color:#6b7280;margin-top:2px;}
    .nav-item.active .nav-sub{color:#fbbf24;opacity:.7;}
    .nav-badge{background:rgba(184,134,11,.25);color:#fde68a;font-size:0.63rem;padding:2px 7px;border-radius:20px;font-weight:700;flex-shrink:0;align-self:center;}
    .nav-soon{font-size:0.63rem;color:#4b5563;align-self:center;}
    .sidebar-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.07);margin-top:auto;}
    .sf-txt{font-size:0.7rem;color:#6b7280;text-align:center;}
    /* Main */
    #main{flex:1;display:flex;flex-direction:column;overflow:auto;}
    .main-header{background:white;border-bottom:1px solid var(--border);padding:20px 30px 0;}
    .header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
    .header-eyebrow{font-size:0.7rem;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
    .header-title{font-family:'Frank Ruhl Libre',serif;font-size:1.5rem;font-weight:700;color:#1a1a2e;}
    .sbadge{font-size:0.71rem;font-weight:700;padding:4px 10px;border-radius:20px;flex-shrink:0;margin-top:4px;}
    .s-active{background:#dcfce7;color:#15803d;}
    .s-soon{background:#f3f4f6;color:#6b7280;}
    .tab-bar{display:flex;gap:3px;}
    .tab-btn{padding:10px 20px;font-size:0.87rem;font-weight:600;border-radius:8px 8px 0 0;cursor:pointer;border:none;background:transparent;color:#718096;font-family:'Assistant',sans-serif;border-bottom:3px solid transparent;transition:all .15s;}
    .tab-btn:hover{color:var(--ink);background:rgba(0,0,0,0.04);}
    .tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:var(--gold-pale);}
    .content-area{padding:26px 30px;max-width:880px;width:100%;}
    /* Cards */
    .card{background:white;border:1px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:18px;}
    .card h3{font-family:'Frank Ruhl Libre',serif;font-size:1.1rem;color:var(--ink);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--gold-light);}
    .brow{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
    .bdot{width:7px;height:7px;background:var(--gold);border-radius:50%;margin-top:7px;flex-shrink:0;}
    .btxt{font-size:0.89rem;line-height:1.72;color:#374151;}
    .tc{display:inline-block;background:#fef3c7;color:#92400e;font-size:0.7rem;padding:2px 7px;border-radius:4px;font-weight:700;margin-right:4px;vertical-align:middle;}
    .tl{display:inline-block;background:#dbeafe;color:#1e40af;font-size:0.7rem;padding:2px 7px;border-radius:4px;font-weight:700;margin-right:4px;vertical-align:middle;}
    .rbox{background:linear-gradient(135deg,#fdf6e3,#fef9ee);border:1px solid var(--gold-light);border-right:4px solid var(--gold);border-radius:8px;padding:13px 15px;margin-bottom:11px;}
    .rname{font-weight:700;font-size:0.84rem;color:var(--gold);margin-bottom:4px;}
    .rtxt{font-size:0.84rem;color:#4b5563;line-height:1.65;}
    /* Flow */
    .fstep{background:white;border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:5px;}
    .fdec{background:#fffbeb;border-color:var(--gold);}
    .fyes{background:#f0fdf4;border-color:#16a34a;}
    .fno{background:#fff1f2;border-color:#e11d48;}
    .flbl{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
    .fq{color:#b45309;}.fs{color:#1d4ed8;}.fy{color:#15803d;}.fn{color:#be123c;}
    .ftxt{font-size:0.87rem;line-height:1.55;}
    .farrow{text-align:center;color:var(--gold);font-size:1.15rem;margin:2px 0;}
    .fbranches{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:5px;}
    /* Practice */
    .ccard{background:white;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
    .chdr{background:var(--sidebar-bg);color:white;padding:16px 22px;display:flex;align-items:center;gap:12px;}
    .cnum{background:var(--gold);color:var(--ink);font-weight:800;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.88rem;flex-shrink:0;}
    .cbody{padding:22px 24px;}
    .ctxt{font-size:0.89rem;line-height:1.85;color:#374151;margin-bottom:18px;}
    textarea.ans{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:13px 15px;font-family:'Assistant',sans-serif;font-size:0.89rem;color:var(--ink);resize:vertical;min-height:130px;outline:none;background:var(--gold-pale);transition:border-color .15s;display:block;}
    textarea.ans:focus{border-color:var(--gold);background:white;}
    .hint{font-size:0.81rem;font-weight:700;color:#374151;margin-bottom:7px;}
    .cbtn{background:var(--sidebar-bg);color:white;border:none;padding:11px 26px;border-radius:8px;font-family:'Assistant',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;margin-top:12px;transition:background .15s;}
    .cbtn:hover{background:#2d2d4e;}
    .cbtn:disabled{opacity:.45;cursor:not-allowed;}
    .fbbox{background:var(--gold-pale);border:1.5px solid var(--gold);border-radius:12px;padding:18px 22px;margin-top:18px;}
    .fbh{font-family:'Frank Ruhl Libre',serif;font-weight:700;font-size:1rem;margin-bottom:13px;}
    .fbs{margin-bottom:13px;}
    .fbs h4{font-size:0.8rem;font-weight:700;color:var(--gold);margin-bottom:5px;}
    .fbs p{font-size:0.86rem;line-height:1.75;color:#374151;}
    .stag{background:#1a1a2e;color:#fde68a;font-size:0.73rem;padding:3px 9px;border-radius:4px;font-weight:600;display:inline-block;margin:3px 3px 3px 0;}
    .tipbox{background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:13px 17px;margin-bottom:20px;font-size:0.84rem;color:#92400e;}
    /* Keyword scoring */
    .scorebox{border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .score-good{background:#f0fdf4;border:1.5px solid #16a34a;}
    .score-mid{background:#fffbeb;border:1.5px solid var(--gold);}
    .score-low{background:#fff1f2;border:1.5px solid #e11d48;}
    .score-pct{font-weight:800;font-size:1rem;flex-shrink:0;}
    .score-good .score-pct{color:#15803d;}
    .score-mid .score-pct{color:#92400e;}
    .score-low .score-pct{color:#be123c;}
    .score-txt{font-size:0.86rem;color:#374151;flex:1;}
    /* Dual checkpoint feedback blocks */
    .cp-block{border-radius:10px;padding:14px 18px;margin-bottom:14px;}
    .cp-block-found{background:#f0fdf4;border:1.5px solid #16a34a;}
    .cp-block-missing{background:#fff1f2;border:1.5px solid #fca5a5;}
    .cp-block-title{font-weight:700;font-size:0.88rem;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .cp-block-found .cp-block-title{color:#15803d;}
    .cp-block-missing .cp-block-title{color:#b91c1c;}
    .cp-list{display:flex;flex-direction:column;gap:7px;}
    .cp-item{display:flex;align-items:flex-start;gap:8px;font-size:0.85rem;line-height:1.6;}
    .cp-item-icon{flex-shrink:0;font-size:0.8rem;margin-top:1px;}
    .cp-block-found .cp-item{color:#166534;}
    .cp-block-missing .cp-item{color:#9f1239;}
    .kw-found{background:#dcfce7;color:#15803d;font-weight:700;padding:1px 6px;border-radius:4px;}
    .kw-missing{background:#fee2e2;color:#b91c1c;font-weight:700;padding:1px 6px;border-radius:4px;margin:2px 3px 2px 0;display:inline-block;}
    /* Media */
    .acard{background:white;border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:13px;}
    .arow{display:flex;gap:13px;align-items:center;margin-bottom:13px;}
    .athumb{width:50px;height:50px;border-radius:9px;background:linear-gradient(135deg,#1a1a2e,#2d2d5e);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
    .atitle{font-weight:700;font-size:0.91rem;color:var(--ink);margin-bottom:3px;}
    .adesc{font-size:0.76rem;color:#718096;}
    audio{width:100%;height:36px;}
    .podlink{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fde68a;text-decoration:none;border-radius:8px;padding:11px 18px;font-size:0.85rem;font-weight:700;transition:background .15s,transform .15s;}
    .podlink:hover{background:var(--gold);color:#1a1a2e;transform:translateY(-1px);}
    /* Coming soon */
    .csoon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 40px;text-align:center;}
    .csicon{font-size:4rem;margin-bottom:14px;}
    .cstitle{font-family:'Frank Ruhl Libre',serif;font-size:1.35rem;font-weight:700;color:#1a1a2e;margin-bottom:8px;}
    .cssub{color:#6b7280;font-size:0.88rem;max-width:360px;line-height:1.7;}
    .csslides{margin-top:22px;background:#f7f4ef;border:1px dashed #ddd5c4;border-radius:10px;padding:12px 22px;font-size:0.8rem;color:#92400e;}
    /* Hamburger menu button (mobile only) */
    #hamburger-btn{display:none;position:fixed;top:14px;right:16px;z-index:1100;width:44px;height:44px;border-radius:10px;border:none;background:var(--sidebar-bg);color:#fde68a;font-size:1.3rem;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,0.25);}
    #hamburger-btn:active{background:#2d2d4e;}
    /* Sidebar overlay backdrop (mobile only) */
    #sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:999;opacity:0;transition:opacity .25s ease;}
    #sidebar-overlay.open{opacity:1;}
    /* ── Mobile layout (≤768px) ── */
    @media (max-width:768px){
      #hamburger-btn{display:flex;}
      #app{display:block;}
      #sidebar{position:fixed;top:0;right:0;height:100vh;width:80%;max-width:300px;right:-100%;transition:right .28s ease;z-index:1000;box-shadow:-4px 0 18px rgba(0,0,0,0.3);}
      #sidebar.open{right:0;}
      #sidebar-overlay.open{display:block;}
      #main{width:100%;}
      .main-header{padding:62px 16px 0;}
      .header-top{flex-wrap:wrap;gap:8px;}
      .tab-bar{overflow-x:auto;-webkit-overflow-scrolling:touch;}
      .content-area{padding:18px 16px;max-width:100%;width:100%;}
      .fbranches{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<button id="hamburger-btn" onclick="toggleSidebar()" aria-label="פתח תפריט ניווט">☰</button>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<div id="app">
  <aside id="sidebar">
    <div class="logo-area">
      <div class="logo-title">קניין 2.0</div>
      <div class="logo-sub">ד"ר עדי מרקוביץ' גרוס · רייכמן</div>
      <div class="prog-label">התקדמות כוללת</div>
      <div class="prog-wrap"><div class="prog-fill"></div></div>
      <div class="prog-info">2 מתוך 5 נושאים פעילים</div>
    </div>
    <div class="nav-sec-lbl">נושאי הקורס</div>
    <nav id="nav-items"></nav>
    <div class="sidebar-footer"><div class="sf-txt">עדכון אחרון: יוני 2026</div></div>
  </aside>
  <main id="main">
    <div class="main-header">
      <div class="header-top">
        <div>
          <div class="header-eyebrow" id="hdr-eyebrow"></div>
          <div class="header-title" id="hdr-title"></div>
        </div>
        <div class="sbadge" id="hdr-status"></div>
      </div>
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="study" onclick="switchTab('study')">📘 מצב לימוד</button>
        <button class="tab-btn" data-tab="practice" onclick="switchTab('practice')">📝 סימולטור תרגול</button>
        <button class="tab-btn" data-tab="media" onclick="switchTab('media')">🎧 ספריית מדיה</button>
      </div>
    </div>
    <div class="content-area" id="content-area"></div>
  </main>
</div>
<script>
const DB = {
  categories:[
    {id:"foundations", icon:"🏛️", label:"הקניין: מהות, משטר, תחולה",  sub:"מצגת 1",        active:true},
    {id:"possession",  icon:"🏠", label:"בעלות בנכסים",                sub:"מצגות 2\u20134",  active:true},
    {id:"ownership",   icon:"🤝", label:"שיתוף בנכסים",                sub:"מצגות 5\u20137",  active:true},
    {id:"sharing",     icon:"🔐", label:"זכויות בנכסי הזולת",          sub:"מצגות 8\u201312", active:true},
    {id:"competition", icon:"⚔️", label:"תחרות בין בעלי זכויות",       sub:"מצגות 13\u201321",active:true},
    {id:"ip",          icon:"💡", label:"קניין רוחני",                  sub:"מצגות 20, 22",   active:true},
    {id:"urban",       icon:"🏗️", label:"התחדשות עירונית",             sub:"מצגת 23",         active:true},
  ],
  content:{
    foundations:{
      study:{
        sections:[
          {title:"מהות הזכות הקניינית",points:[
            {text:"הזכות הקניינית היא זכות כנגד כולי עלמא (in rem) \u2014 שונה מזכות חוזית הפועלת רק בין הצדדים.",tags:[{t:"l",v:"חוק יסוד: כבוד האדם"},{t:"l",v:"ס' 161 חוק המקרקעין"}]},
            {text:"מאפיינים מרכזיים: עקיבות (הזכות עוקבת אחר הנכס), עדיפות (קניין גובר על חיוב), אפשרות שימוש בכוח נגד מפרים.",tags:[]},
            {text:"רשימת הזכויות הקנייניות סגורה (numerus clausus) \u2014 לא ניתן להמציא זכויות קניין חדשות.",tags:[{t:"c",v:"בן חמו נ' טנא נוגה"}]},
          ]},
          {title:"משטרי הקניין \u2014 שלושה מסלולים",points:[
            {text:"נחלת הכלל (Commons): משאב פתוח לכל. הבעיה: 'טרגדיית נחלת הכלל' \u2014 ניצול יתר מתוך תמריץ אישי (Hardin, 1968).",tags:[]},
            {text:"קניין פרטי: מתן בלעדיות לבעלים לצורך ניצול יעיל. הצדקת Demsetz: הפנמת עלויות חיצוניות.",tags:[]},
            {text:"קניין ציבורי / לאומי: מקרקעי ישראל (93% מקרקעות המדינה). הצדקות לאומיות ויעילות.",tags:[{t:"l",v:"חוק יסוד: מקרקעי ישראל"}]},
            {text:"Anticommons (הלר): ריבוי בעלי זכות וטו \u2014 תת-ניצול של משאבים (לדוגמה: ריבוי פטנטים).",tags:[]},
          ]},
          {title:"סוגי נכסים \u2014 מקרקעין ומיטלטלין",points:[
            {text:"מקרקעין: קרקע, מה שמחובר לה בחיבור קבע ורישיון לשימוש \u2014 כולל מינרלים ועצים.",tags:[{t:"l",v:"ס' 1 חוק המקרקעין"}]},
            {text:"מיטלטלין: כל נכס שאינו מקרקעין. כולל זכויות (תיקון 2005) \u2014 חוב, פטנט, מניות.",tags:[{t:"l",v:"ס' 1\u20133 חוק המיטלטלין"}]},
            {text:"אוצרות טבע: שייכים למדינה (גז, נפט, מי תהום) \u2014 אינם ניתנים לרכישה פרטית.",tags:[{t:"c",v:'בג"ץ 3734/11 דודיאן'}]},
          ]},
          {title:"מגבלות הבעלות \u2014 תום לב ושכנות",points:[
            {text:"בעלות אינה מוחלטת. חובת תום לב מגבילה שימוש בזכות לצורך הכבדה על השכן ללא תועלת לבעלים.",tags:[{t:"c",v:"רוקר נ' סלומון"},{t:"l",v:"ס' 14 חוק המקרקעין"}]},
            {text:"איסור הפליה: חל על בעלי מקרקעין בפעילות עסקית \u2014 אסור לסרב שירות מטעמי גזע, דת, מגדר.",tags:[{t:"l",v:"חוק איסור הפליה 2000"}]},
          ]},
        ],
        rulings:[
          {name:'ע"א 2850/99 בן חמו נ\' טנא נוגה',text:"הכיר בעיקרון numerus clausus \u2014 רשימת הזכויות הקנייניות סגורה ואין לייצר זכויות קניין חדשות מחוצה לה."},
          {name:'רע"א 6339/97 רוקר נ\' סלומון',text:"שימוש בזכות קניין שמטרתו הכבדה על השכן ללא כל תועלת לבעלים \u2014 מהווה שימוש לרעה בזכות ועשוי לחייב סעד."},
          {name:'בג"ץ 5578/02 מנור נ\' שר האוצר',text:"הקניין מוגן כזכות יסוד חוקתית. הפגיעה בו מותרת רק לתכלית ראויה, בחוק, ובמידה שאינה עולה על הנדרש."},
        ],
        flow:{
          title:"תרשים זרימה: האם הפעולה מותרת לבעלים?",
          steps:[
            {type:"step",  label:"שלב",   text:"זהה את סוג הנכס \u2014 מקרקעין / מיטלטלין / זכות"},
            {type:"arrow"},
            {type:"q",     label:"שאלה",  text:"האם הפועל הוא הבעלים הרשום / בעל הזכות?"},
            {type:"br", yes:"עבור לשלב הבא", no:"בדוק האם יש זכות שימוש חוזית (רשות, שכירות)"},
            {type:"arrow"},
            {type:"q",     label:"שאלה",  text:'האם השימוש מהווה "הכבדה" על השכן ללא כל תועלת לבעלים?'},
            {type:"br", yes:"עשוי לסתור ס' 14 + תום לב (רוקר נ' סלומון)", no:"הפעולה מותרת \u2014 בעלות קלאסית"},
          ]

              {text:"רע\"א 4657/21 כהן נ' משה\"ב (תמ\"א 38): היזם ביצע פרויקט תמ\"א 38. הבנייה ביצעה פלישה תת-קרקעית לעוגני יסודות בחלקת השכנים. לא ניתן להסיר את העוגנים בלי הריסת בניין השכנים. נקבע: בית המשפט לא יאפשר סילוק יד כיוון שהדבר יגרום לפגיעה קשה בצדדים שלישיים (דיירים אחרים) ולא כל בעלי הזכויות צורפו להליך. אך נפסק פיצוי חלופי בהתאם לשווי זכות הקניין שנפגעה במשא ומתן כפוי.",tags:[{t:"c",v:"רע\"א 4657/21 כהן נ' משה\"ב חברה לבניין ופיתוח בע\"מ"}]},

            text:"דנה ביצעה שיפוץ תמ\"א 38 בבניין שבו היא מתגוררת. בתהליך הבנייה, היזם השלפי ביצע פלישה תת-קרקעית לעוגני יסודות שחורגים לתוך חלקת השכן (יוסי), מבלי לבקש את הסכמתו ומבלי שהיה מודע לכך בזמן אמת. כעת לא ניתן להסיר את העוגנים בלי לגרום נזק קשה לבניין כולו (כולל לדירות דיירים אחרים שלא צורפו להליך). יוסי דורש צו הריסה. בנפרד, באותו בניין, דייר נוסף (אבי) הסגיר מחסן פרטי על הגג ללא היתר בנייה, באופן שחוסם אור שמש משכנו שמתחתיו. השכן דורש גם הוא צו הריסה. נתחו את שני המקרים.",
            ans:{
              sum:"בעניין עוגני התמ\"א 38, בית המשפט לא יורה על הריסה (פסיקת פיצוי חלופי במשא ומתן כפוי); בעניין מחסן הגג החוסם אור שמש, יש הסגת גבול (חסימת אור שמש), אך בית המשפט יבחן את הקריטריונים של רוקר נ' סלומון לפני שיקבע אם להורות על הריסה.",
              lines:["עוגני התמ\"א 38: לפי כהן נ' משה\"ב (רע\"א 4657/21), כשהסרת הפלישה תגרום נזק בלתי הפיך לצדדים שלישיים (דיירים אחרים שלא צורפו להליך), בית המשפט לא יורה על סילוק יד, אלא יפסוק פיצוי הולם בהתאם לשווי זכות הקניין שנפגעה במשא ומתן כפוי.","מחסן הגג: לפי בצלאל נ' סימנטוב (ע\"א 403/73), חסימת אור שמש מהווה הסגת גבול במקרקעין ונחשבת לפגיעה תועמשמית המצדיקה צו מנע.","אולם, לפי רוקר נ' סלומון (רע\"א 6339/97), בית המשפט לא ייתן צו הריסה אוטומטי – יביא בחשבון את עוצמת זכות הקניין, היקף הפגיעה, חומרתה, ותום הלב/חוסר תום הלב של הצדדים.","ההבדל המכריע בין שני המקרים: בעוגני התמ\"א 38 יש פגיעה בצדדים שלישיים רבים שלא צורפו (כמו בנעמה נ' טורקיה, ע\"א 8661/10), מה שמכריע נגד הריסה; במחסן הגג מדובר בשני שכנים בלבד, ולכן שיקול הצדדים השלישיים פחות דומיננטי."],

        sections:[
          {title:"שכירות וחכירה — הגדרה, מאפיינים וסיווג (מצגות 8–9)",points:[
            {text:"שכירות היא זכות קניינית: הזכות שהוקנתה בתמורה להחזיק במקרקעין ולהשתמש בהם שלא לצמיתות. שכירות מחמש שנים תיקרא 'חכירה'; שכירות לתקופה שלמעלה מעשרים וחמש שנים תיקרא 'חכירה לדורות'.",tags:[{t:"l",v:"ס' 3 חוק המקרקעין"}]},
            {text:"ארבעה יסודות השכירות: תמורה; חזקה ושימוש; לא לצמיתות; יצירת הזכות.",tags:[{t:"l",v:"ס' 3 חוק המקרקעין"}]},
            {text:"שכירות לתקופה שאינה עולה על חמש שנים אינה טעונה רישום, והתחייבות לעשות עסקה כזו אינה טעונה מסמך בכתב. סעיף 152 לחוק הגנת הדייר מאריך תקופה זו לעשר שנים.",tags:[{t:"l",v:"ס' 79(א) חוק המקרקעין"},{t:"l",v:"ס' 152 חוק הגנת הדייר"}]},
            {text:"עבירת הזכות — ס' 22(א) חוק השכירות והשאילה: השוכר אינו רשאי להעביר את הזכות אלא בהסכמת המשכיר. אם לא הסכים המשכיר מטעמים בלתי סבירים: (1) בשכירות מקרקעין — השוכר רשאי לעשות העסקה בלי הסכמתו; (2) בכל שכירות — רשאי ביהמ\"ש להרשות.",tags:[{t:"l",v:"ס' 22(א) חוק השכירות והשאילה"}]},
            {text:"כאשר מדובר בחוזה חכירה לדורות ממושכת, יש הנחה פרשנית שהצדדים התכוונו להעביר את מרב הזכויות בנכס לחוכר, וכוללת גם את זכויות הבנייה היחסיות.",tags:[{t:"c",v:"ע\"א 2821/95 לוסטיג נ' מייזלס"}]},
            {text:"הפסיקה הכירה בזכות החכירה כמקנה עדיפות על פני עיקול שהוטל על ידי נושה רשום — זכותו של הדייר הבלתי רשום גוברת על המעקל. ס' 9 לחוק המקרקעין חל גם על רישיון בלתי הדיר מכוח השתק.",tags:[{t:"c",v:"ע\"א 7139/99 אלוני נ' ארד"},{t:"l",v:"ס' 9 חוק המקרקעין"}]},
            {text:"סיווג זכות שימוש כ'רשות' (license) או 'שכירות' ייקבע לפי תוכן הזכות, לאור כוונת הצדדים המשתמעת מן ההסכם ולאור הנסיבות הסובבות.",tags:[{t:"c",v:"ע\"א 7139/99 אלוני נ' ארד"}]},
          ]},
          {title:"משכונות ושעבודים – כללי ומשכנתא (מצגות 9–11)",points:[
            {text:"הגדרה — ס' 1(א) חוק המשכון: 'משכון הוא שעבוד נכס כערובה לחיוב; הוא מזכה את הנושה להיפרע מן המשכון אם לא סולק החיוב.' שלושה רכיבים: מהות — שעבוד נכס; מטרה — הבטחת החיוב; אמצעי — הזכות להיפרע.",tags:[{t:"l",v:"ס' 1(א) חוק המשכון"}]},
            {text:"היקף התחולה — ס' 2(ב) חוק המשכון: הוראות חוק זה יחולו על כל עסקה שכוונתה שעבוד נכס כערובה לחיוב, יהא כינויה אשר יהא — יש לבחון את העסקה לפי מהותה ולא לפי חזותה.",tags:[{t:"l",v:"ס' 2(ב) חוק המשכון"}]},
            {text:"זכות התחלוף (ס' 14 לחוק המשכון – פדיון משכון): משכון שלא נפדה על ידי החייב לפי ס' 13 – זכאי מי שאינו החייב (כגון ערב שמילא את ערבותו) לחזור אל החייב ולהיפרע ממנו.",tags:[{t:"l",v:"סעיף 14 לחוק המשכון"}]},
            {text:"מימוש על ידי רשות (ס' 17(2) לחוק המשכון): הנושה יכול לפנות לפועל ולבקש לבצע עסקה. מימוש עצמי (ס' 17(4) ו-20): הנושה יכול להיכנס לנעלי החייב ולמכור את הזכות ללא צו בית משפט, כאשר עיקרו של הנכס הוא נייר ערך הנכנס בגדרי ס' 17(4).",tags:[{t:"l",v:"סעיפים 17(2), 17(4), 20 לחוק המשכון"},{t:"c",v:"ע\"א 4294/97 אובזילר נ' בנק דיסקונט לישראל"}]},
            {text:"מימוש בהסכמה — ס' 16(ב) חוק המשכון (קוגנטי): 'אין הצדדים רשאים להתנות על דרכי המימוש לפי חוק זה כל עוד לא הגיע המועד לקיום החיוב.'",tags:[{t:"l",v:"ס' 16(ב) חוק המשכון"}]},
            {text:"משכון זכויות – ממשק עם חוק המחאת חיובים: זכותו של נושה, לרבות זכות עתידה או מותנית, ניתנת להמחאה ללא הסכמת החייב, זולת אם נשללה לפי מהות הזכות או לפי ההסכם.",tags:[{t:"l",v:"סעיף 1 לחוק המחאת חיובים"}]},
            {text:"שעבוד ניירות ערך (ס' 24 לחוק המשכון): 'ניירות ערך' – תעודה, שטר או מסמך המוצאים לפי דין או נוהג, לפקודה או למוכ\"ז, המקנים לאוחז בהם את הזכות הנדונה.' הכולל גם ניירות ערך הנסחרים בבורסה.",tags:[{t:"l",v:"סעיף 24 לחוק המשכון"}]},
          ]},
          {title:"משכון מיטלטלין – יצירה ושכלול (מצגת 10)",points:[
            {text:"שני שלבים ליצירת משכון כלפי צדדים שלישיים: שלב א' יצירה — ס' 3(א) חוק המשכון: 'משכון נוצר בהסכם בין החייב לבין הנושה' (זכות חוזית). שלב ב' שכלול — רישום או הפקדה (זכות קניינית תקפה כלפי צד ג').",tags:[{t:"l",v:"ס' 3(א) חוק המשכון"}]},
            {text:"ס' 4 חוק המשכון — דרישות השכלול: (1) בנכסים שיש להם דין אחר — בהתאם לאותן הוראות; (2) בנכסים נדים ובניירות ערך שלא הופקדו — עם רישום המשכון; (3) בניירות ערך שהופקדו — עם ההפקדה. חריג: המשכון תקף אף ללא רישום כלפי נושה שידע עליו.",tags:[{t:"l",v:"ס' 4 חוק המשכון"}]},
          ]},
          {title:"שעבוד צף – מאפיינים ותחרות (מצגת 10)",points:[
            {text:"שעבוד צף מוגדר בסעיף 1 לפקודת החברות. אינו תופס נכס מסוים, אלא מטיל שעבוד כללי על מצבת הנכסים של החברה. כשהחברה נכנסת לקשיים השעבוד 'מתגבש' והנכסים 'נתפסים'.",tags:[{t:"l",v:"ס' 1 פקודת החברות"}]},
            {text:"ס' 169(ב) לפקודת החברות: שעבוד צף אינו מקנה קדימה על פני שעבוד ספציפי (קודם או מאוחר). תניה מגבילה שנרשמה ברשם המשכונות תגבר על שעבוד ספציפי שנוצר בניגוד לה לאחר הרישום.",tags:[{t:"l",v:"ס' 169(ב) פקודת החברות"}]},
            {text:"תחרות — כללי עדיפות: שעבוד ספציפי קודם/מאוחר גובר על שעבוד צף; שסל\"ן (שעבוד שאיפשר רכישת הנכס) גובר על שעבוד צף אף אם הצף קדם — ס' 169(ד) פקודת החברות; בין שעבודים רגילים — ראשון בזמן גובר.",tags:[{t:"l",v:"ס' 169 פקודת החברות"}]},
            {text:"הלכת תשתיות (השפכה של הלכת מיראז', השופטת ברלינר): לרישום יש מעמד קונסטיטוטיבי. תניה מגבילה תחול רק ממועד רישומה במרשם החברות (להבדיל מהשעבוד עצמו שיש לו תוקף רטרואקטיבי).",tags:[{t:"c",v:"הלכת תשתיות"}]},
          ]},
          {title:"משכנתא – יצירה, שכלול, פדיון והגנות מיוחדות (מצגת 11)",points:[
            {text:"משכנתא = משכון של מקרקעין (ס' 4 חוק המקרקעין). שני שלבים: יצירה — הסכם בכתב ס' 7 חוק המקרקעין; שכלול — רישום ס' 8 חוק המקרקעין. עסקה שלא נגמרה ברישום נחשבת התחייבות לעשות עסקה בלבד.",tags:[{t:"l",v:"ס' 4, 7, 8 חוק המקרקעין"}]},
            {text:"מימוש המשכנתא רק באמצעות רשות (ס' 90 חוק המקרקעין). ס' 88: 'אין בכוחם של תנאי המשכנתא לגרוע מהזכות לפדות את המקרקעין הממושכנים לפני המועד לקיום החיוב.'",tags:[{t:"l",v:"ס' 88, 90 חוק המקרקעין"}]},
            {text:"השארת הדייר/בעלים — ס' 33 חוק הגנת הדייר: מי שהחזיק בנכס כבעלים ופקעה זכותו מחמת מכירת פסק דין, יהיה לדייר של בעלו החדש. ניתן לממש את המשכנתא אך הדייר יישאר בנכס (ניתן להתנות בשפה ברורה).",tags:[{t:"l",v:"ס' 33 חוק הגנת הדייר"},{t:"c",v:"ע\"א 1679/01 משכן בנק הפועלים נ' שפייזמן"}]},
            {text:"דיור חלוף — ס' 38 חוק ההוצאה לפועל: לא ניתן לפנות חייב מדירת מגוריו ללא הוכחת מקום מגורים חלוף סביר. הגנה זו אינה קוגנטית — ניתנת להתנאה, אך חייבת להיאמר בשפה ברורה, ועל הבנק חובת הגינות להסביר את נפקות הוויתור.",tags:[{t:"l",v:"ס' 38 חוק ההוצאה לפועל"},{t:"c",v:"ע\"א 9136/02 מיסטר מאני ישראל נ' שרה רייז"}]},
            {text:"רע\"א (חיפה) 14468-06-10 יניב שטרית נ' בנק לאומי למשכנתאות: ביהמ\"ש קבע כי יש לאפשר לחייבים לבצע מכר עצמי של הדירה לפי ס' 81ב1(ב)(3) חוק ההוצאה לפועל, אשר יקיים את האינטרסים שלהם ושל הנושה, ומינוי כונס נכסים בוטל.",tags:[{t:"c",v:"רע\"א (חיפה) 14468-06-10 שטרית נ' בנק לאומי"},{t:"l",v:"ס' 81ב1(ב)(3) חוק ההוצאה לפועל"}]},
          ]},
          {title:"תניית שימור בעלות ומשכון מוסווה – הלכת קולומבו (מצגת 11)",points:[
            {text:"תניית שימור בעלות (retention of title): תנאי בחוזה הקובע שהבעלות בסחורה תעבור ללקוח רק לאחר תשלום מלא. אם הלקוח נקלע לפירוק לפני ששילם — הספק מנסה לקחת בחזרה את הסחורה.",tags:[]},
            {text:"הלכת קולומבו — ע\"א 455/89: עסקת קונסיגנציה שכוונתה מהותית משכון (שעבוד כערובה) מחייבת רישום לפי ס' 178(א) פקודת החברות. בהיעדר רישום — השיעבוד בטל כלפי נושים בפירוק.",tags:[{t:"c",v:"ע\"א 455/89 קולומבו נ' בנק למסחר"},{t:"l",v:"ס' 178(א) פקודת החברות"}]},
            {text:"הלכת קידוחי הצפון — רע\"א 1690/00: צמצום הלכת קולומבו. מבחן דו-שלבי: (1) סובייקטיבי — האם הצדדים התכוונו לשעבד? (2) אובייקטיבי — האם ההיגיון הכלכלי הוא של משכון? אם שתי התשובות שליליות — יש לכבד תניית שימור הבעלות כלשונה.",tags:[{t:"c",v:"רע\"א 1690/00 קידוחי הצפון נ' גוילי"},{t:"l",v:"ס' 2(ב) חוק המשכון"}]},
          ]},
          {title:"הערת אזהרה ומעמד נושה מובטח (מצגת 11)",points:[
            {text:"הערת אזהרה (ס' 126 לחוק המקרקעין): מאפשרת לרשום הערה על התחייבות בין צדדים על נכס מסוים. יכולה להיות חיובית (לבצע עסקה) או שלילית (להימנע מעסקה).",tags:[{t:"l",v:"סעיף 126 לחוק המקרקעין"}]},
            {text:"ס' 127 לחוק המקרקעין: כל עוד לא נמחקה הערת האזהרה – לא תירשם עסקה הסותרת את תוכן ההערה. לזכאי הערת האזהרה יש מעמד של 'נושה מובטח' – עדיפות בפירעון על פני נושים אחרים.",tags:[{t:"l",v:"סעיף 127 לחוק המקרקעין"}]},
            {text:"הערת אזהרה שלילית מקנה לבעלה מעמד של נושה מובטח (פסד ורדי). הן הערה חיובית והן שלילית מוגנות על ידי ס' 127(ב).",tags:[{t:"l",v:"סעיף 127(ב) לחוק המקרקעין"},{t:"c",v:"ע\"א 3042/19 ורדי נ' רייכמן"}]},
          ]},
        ],

                src:["סעיף 38 לחוק ההוצאה לפועל","ע\"א 9136/02 מיסטר מאני ישראל נ' שרה רייז","ע\"א 1679/01 משכן בנק הפועלים נ' שפייזמן","סעיף 14 לחוק המשכון","סעיפים 90, 126, 127 לחוק המקרקעין"]}

            title:"עסקאות נוגדות – הכלל הבסיסי וס' 9 (מצגות 13–14)",
            points:[
              {text:"עסקאות נוגדות הן התחייבויות סותרות ביחס לאותו נכס: א' התחייב לעסקה בנכס כלפי ב', ולפני שהזכות החוזית הושלמה ברישום, א' מתחייב כלפי ג' לעסקה מאוחרת בנכס. לא ניתן לקיים שתיהן בו-זמנית.", tags:[]},
              {text:"סעיף 9 לחוק המקרקעין – הכלל הבסיסי (רישא): כאשר שני המתחרים בעלי זכות אישית בלבד – ראשון בזמן גובר ('ראשון זוכה, שני בוכה').", tags:[{t:"l",v:"סעיף 9 רישא לחוק המקרקעין"}]},
              {text:"ס' 9 סיפא – החריג (תת\"ר): השני בזמן גובר אם עמד בשלושה תנאים מצטברים: ① תום לב ② תמורה ③ רישום בטאבו שהופך את זכותו לקניינית. המשל: הקונה המושלם – אדם ישר, יש לו כסף, ורכש דירה רשומה בטאבו.", tags:[{t:"l",v:"סעיף 9 סיפא לחוק המקרקעין"}]},
              {text:"מצב שלישי שס' 9 אינו מתייחס אליו: לראשון בזמן יש זכות קניינית – ברור שהראשון גובר. הסעיף חל רק כששני הצדדים בעלי זכות אישית (אובליגטורית) בלבד.", tags:[]},
              {text:"עסקאות נוגדות בשכירות קצרה (ס' 80 לחוק המקרקעין): מה שמחליף את הרישום מבחינת הפומביות – קבלת החזקה בשכור. המחזיק בנכס גובר.", tags:[{t:"l",v:"סעיף 80 לחוק המקרקעין"}]},
              {text:"עסקאות נוגדות במיטלטלין (ס' 12 לחוק המיטלטלין): מה שמחליף את הרישום – המסירה. מחזיק הנכס גובר.", tags:[{t:"l",v:"סעיף 12 לחוק המיטלטלין"}]},
              {text:"עסקאות נוגדות בזכויות (ס' 4 לחוק המחאת חיובים): הנדבך הרלוונטי – הודעת החייב. הנמחה הראשון קודם, אלא אם החייב הודיע על ההמחאה השנייה לפני שנמסרה לו ההמחאה הראשונה.", tags:[{t:"l",v:"סעיף 4 לחוק המחאת חיובים"}]},
            ]

          {
            title:"הערת אזהרה ותחרות – פסיקה מרכזית (מצגות 13–14)",
            points:[
              {text:"הלכת גנז (ע\"א 2643/97): אי-רישום הערת אזהרה של הקונה הראשון בזמן עשוי להצביע על חוסר תום-לב ולהכריע את התחרות לטובת השני, גם אם השני לא השלים את כל דרישות ס' 9. מבחן תום-הלב הוא כפול: סובייקטיבי (ידע בפועל?) ואובייקטיבי (היה עליו לנהוג אחרת?).", tags:[{t:"c",v:"ע\"א 2643/97 גנז נ' בריטיש קולוניאל חברה בע\"מ"}]},
              {text:"חריגים מהלכת גנז שבהם הראשון בזמן עשוי לגבור גם ללא הערת אזהרה: (1) מניעה עובדתית לרישום; (2) אי-רישום מוצדק משיקולי מדיניות (כגון בין בני זוג); (3) לא חלף זמן סביר ממועד העסקה; (4) אין קש\"ס – רישום הערת אזהרה לא היה מונע את הנזק.", tags:[{t:"c",v:"ע\"א 2643/97 גנז נ' בריטיש קולוניאל חברה בע\"מ"}]},
              {text:"פסד ספיבק (ע\"א 2907/04): הזכות המעין-קניינית אינה זכות אובליגטורית 'רגילה'. היא מקנה לקונה זכות להירשם כבעלים ומיצרת יחס נאמנות קונסטרוקטיבית. אי-רישום הערת אזהרה לכשעצמו אינו מהווה ויתור.", tags:[{t:"c",v:"ע\"א 2907/04 ספיבק נ' עיזבון ספיבק"}]},
              {text:"פסד ורדי (ע\"א 3042/19): הערת אזהרה שלילית מקנה לבעלה מעמד של נושה מובטח. בית המשפט הדגיש כי מעמד זה תואם את מטרות דיני השעבודים ואת תכלית רישום הערת האזהרה.", tags:[{t:"c",v:"ע\"א 3042/19 ורדי נ' רייכמן"},{t:"l",v:"ס' 127(ב) לחוק המקרקעין"}]},
              {text:"פסד וינברג (ע\"א 9245/99): בעל עסקה ראשונה שיכול לרשום הערת אזהרה ואינו עושה כן עשוי לחוב בנזיקין לאחר שנפגע. הבחינה לפי אמות מידה אובייקטיביות ונסיבות ספציפיות.", tags:[{t:"c",v:"ע\"א 9245/99 וינברג נ' ניאר"}]},
              {text:"מיתון הלכת גנז – פסד ביאד (ע\"א 7113/11): אי-רישום הערת אזהרה אינו קנס אוטומטי. יש לבחון מכלול נסיבות: אפשרות מעשית לרישום, ידיעה על השני. הנטל מוטל על הקונה הראשון להראות כי השני פעל בחוסר תום לב.", tags:[{t:"c",v:"ע\"א 7113/11 עיזבון מחמוד ביאד נ' עיזבון חסוחי מאחל"}]},

            points:[
              {text:"הלכת בוקר (ע\"א 178/70) – בוטלה: ס' 161 לחוק המקרקעין שולל זכויות שביושר. קבעה כי עיקול מאוחר גובר על זכות חוזית (אובליגטורית) קודמת שלא נרשמה.", tags:[{t:"c",v:"ע\"א 178/70 (הלכת בוקר – בוטלה)"},{t:"l",v:"ס' 161 לחוק המקרקעין"}]},
              {text:"הלכת בונוראה (ע\"א 189/95 – הפכה את בוקר): כאשר מוכר מתחייב להקנות בעלות לקונה, נוצרת לקונה זכות מעין-קניינית. זכות זו פועלת כלפי נושים/עוקלים של המוכר – הקונה גובר על נושה מאוחר גם ללא הערת אזהרה.", tags:[{t:"c",v:"ע\"א 189/95 בנק אוצר החייל נ' בונוראה"}]},
              {text:"פסד גדי (ע\"א 790/97): הלכת גנז לא חלה על תחרות בין קונה לנושים כלליים. אי-רישום הערת אזהרה 7 שנים אינו מסייע לנושה לא-מובטח. הנמקות: (1) עיקול אינו 'עסקה נוגדת'; (2) אין הסתמכות על נכס ספציפי; (3) עוצמת האינטרס של הנושה בנכס חלשה.", tags:[{t:"c",v:"ע\"א 790/97 הבנק המזרחי המאוחד נ' גדי"}]},
              {text:"הזכות המעין-קניינית פועלת כלפי נושים מאוחרים ועוקלים, אך אינה גוברת על מי שעמד בתת\"ר המלא של ס' 9 סיפא. יוצרת יחס נאמנות קונסטרוקטיבית בין מוכר לקונה.", tags:[{t:"c",v:"ע\"א 189/95 בונוראה; ע\"א 2907/04 ספיבק"}]},
            ]

          {
            title:"תחרות בני זוג מול נושים ועוקלים (מצגת 16)",
            points:[
              {text:"לבן/בת הזוג שאינם רשומים יש זכויות בנכס מכוח אחד מהבאים: (1) חזקת השיתוף הפסיקתית (לזוגות שנישאו לפני 1974); (2) חוק יחסי ממון (לזוגות שנישאו לאחר 1974); (3) שיתוף בנכס ספציפי מכוח עקרונות כלליים.", tags:[]},
              {text:"הלכת בן-יצחק (ע\"א 3002/93): כאשר הנכס הוא דירת מגורים ומדובר בנושה שיודע כי הנכס רשום על שם אחד מבני-הזוג ושניהם גרים בו – חלה חובת תום-לב מוגברת. ידיעה על נישואין + הסתמכות על נכס משפחתי = חוסר תום לב.", tags:[{t:"c",v:"ע\"א 3002/93 בן-יצחק נ' סיטין (חזקת שיתוף)"}]},
              {text:"שב\"א גולן 951/96 (חוק יחסי ממון): חוק יחסי ממון אינו יוצר זכות קניינית לבן-הזוג במהלך הנישואין – אלא זכות אובליגטורית לאיזון משאבים בעת גירושין בלבד. בנק שרכש זכות בתמורה ובתום-לב – גובר על זכות האיזון.", tags:[{t:"c",v:"שב\"א 951/96 גולן נ' גולן"},{t:"l",v:"חוק יחסי ממון תשל\"ג-1973"}]},
              {text:"הלכת שלם (ע\"א 8791/00): הבחנה בין נכסים משפחתיים מובהקים (דירת מגורים – שיתוף מתגבש בניהול אורח חיים תקין ומאמץ משותף) לבין שאר הנכסים (שיתוף מתגבש ב'דעום קריטי' בחיי הנישואין).", tags:[{t:"c",v:"ע\"א 8791/00 שלם נ' טווינקו (שיתוף בחובות)"}]},
              {text:"פסד טורג'מן (ע\"א 8497/06): כאשר דירה רשומה כולה על שם הבעל בלבד ונמשכנה לטובת בנק בתמורה ובתום-לב, והזוג לא הגיע ל'דעום קריטי' – הדירה כולה ממושכנת לטובת הבנק, לא רק מחצית.", tags:[{t:"c",v:"ע\"א 8497/06 טורג'מן נ' בנק דיסקונט ואח'"}]},
            ]

          {
            title:"תחרות בין נהנה בנאמנות לנושה חיצוני (מצגת 16)",
            points:[
              {text:"נאמנות – הגדרה (ס' 1 לחוק הנאמנות): 'נאמנות היא קשר לנכס שעל פיה חייב נאמן להחזיק או לפעול בו לטובת הנהנה או למטרה אחרת.' נאמן הוא הבעלים הרשום; הנהנים הם 'מאחורי הקלעים'.", tags:[{t:"l",v:"סעיף 1 לחוק הנאמנות"}]},
              {text:"נאמנות נוצרת לפי ס' 2 לחוק הנאמנות: על פי חוק, על פי הסכם עם הנאמן, או על פי כתב הקדש.", tags:[{t:"l",v:"סעיף 2 לחוק הנאמנות"}]},
              {text:"נכסי נאמנות (ס' 3(ב)): לא ניתן לרדת לנכסי הנאמנות אלא בשל חובות המוטלים עליהם או הנובעים מפעולות הנאמנות. חוב חיצוני של הנאמן – אינו מאפשר לרדת לנכסי הנאמנות.", tags:[{t:"l",v:"סעיף 3(ב) לחוק הנאמנות"}]},
              {text:"כוחה של נאמנות כלפי צד שלישי (ס' 5): כוחה יפה כלפי כל מי שידע עליה, ומשנרשמה הערה לפי ס' 4 – כלפי כל העולם.", tags:[{t:"l",v:"סעיף 5 לחוק הנאמנות"}]},
              {text:"פסד אמסטר (ע\"א 5955/09): מגמת הפסיקה לחזק את זכויות הנהנה בנכסי הנאמנות ולהעדיפו על פני עיקול חיצוני של נושה שאין לו קשר לנאמנות. תוצאה זו תואמת את מהות הנאמנות – פעולה לטובת הנהנה.", tags:[{t:"c",v:"ע\"א 5955/09 כונס הנכסים עו\"ד יעקב אמסטר נ' שרה מרשה טוברט"},{t:"l",v:"ס' 3(ב), 5 לחוק הנאמנות"}]},
            ]
          },
          {
            title:"עסקאות קומבינציה במקרקעין – יחסי בעל קרקע, קבלן ורוכשי דירות (מצגת 17)",
            points:[
              {text:"עסקת קומבינציה מולידה מספר מערכות יחסים מקבילות: בעלים–קבלן, קבלן–רוכש, רוכש–בעלים. לעיתים נרקמים יחסים גם בין הבעלים לבנק המממן את הרכישה עבור הרוכש תמורת משכנתא.",tags:[]},
              {text:"ביטול הסכם הקומבינציה בין בעלים לקבלן אינו מחייב ממנה ביטול הערות האזהרה שנרשמו לטובת הרוכשים. הטעם לכך טמון במבנה הבכרומ של עסקאות קומבינציה.",tags:[{t:"c",v:"ע\"א 7654/07 ברקוביץ' נ' קורין"}]},
              {text:"הכלל שנקבע בברקוביץ': ביטול הסכם הקומבינציה בין הבעלים לקבלן אינו גורר מחיקת הערות האזהרה שנרשמו לטובת הרוכשים, שכן הערות אלו יצרו 'התחייבות אישית ישירה ואוטונומית' בין הבעלים לרוכש.",tags:[{t:"c",v:"ע\"א 7654/07 ברקוביץ' נ' קורין"}]},
              {text:"מערכת היחסים בין הבעלים לרוכש אינה תלויה כולה ביחסי בעלים–קבלן. לכן, גם כאשר הסכם הקומבינציה בוטל וכאשר הסכם הרכישה בין הקבלן לרוכש הפך לבלתי ניתן לאכיפה – הערת האזהרה שיצרה יחסים משפטיים בין הבעלים לרוכש תישאר על כנה.",tags:[{t:"c",v:"ע\"א 7654/07 ברקוביץ' נ' קורין"}]},
              {text:"ביהמ\"ש מבסס את החלטתו על דיני השליחות: התנהגות קורין (החולש) כלפי הרוכשים והמסמכים עליהם חתם (כתבי ההרשאות ויפוי הכוח) יצרו מצג כי עו\"ד פינטצ'קסי הוא שלוחו הפועל באשרות. משכך, קמה שליחות מלאה כלפי הרוכשים.",tags:[{t:"c",v:"ע\"א 7654/07 ברקוביץ' נ' קורין"}]},
              {text:"ביהמ\"ש מטיל חובה על הבעלים הקובע תנאים מוקדמים לרישום הערה לנהוג בתום לב ולדאוג שהתנאים יובאו לידיעת הרוכש באופן סביר ומקובל על הדעת. הרציונל: הגנה על הרוכשים, שהם החוליה החלשה ביחסי הקומבינציה.",tags:[{t:"c",v:"ע\"א 7654/07 ברקוביץ' נ' קורין"}]},
              {text:"פסד ארץ קדושה (פ\"ה 47422-03-10): גם ברכישה רגילה (שאינה קומבינציה) שבה הסכימו בעלי קרקע לכך שהחברה תמכור דירות לצדדים שלישיים וקיבלו תמורה מהרכישות – אינם רשאים לבטל את הסכם המכר ולמחוק את הערות האזהרה. הרוכשים רשאים היו לסמוך על ייצוג עורכי הדין.",tags:[{t:"c",v:"פ\"ה (מרכז) 47422-03-10 ארץ קדושה ואח' נ' גוש 6400 חלקה 57 בע\"מ"}]},

              {text:"תנאים מצטברים לתחולת תקנת השוק: (1) רכישת זכות במקרקעין (כולל רישום); (2) מקרקעין מוסדרים; (3) רכישה בתמורה; (4) תום לב (סובייקטיבי ואובייקטיבי); (5) הסתמכות על הרישום; (6) הרישום לא היה נכון (שגגה פנימית במשרד). הפסיקה מצמצמת את התנאים.",tags:[{t:"l",v:"סעיף 10 לחוק המקרקעין"}]},

              lines:["פירוק שיתוף (ס' 37 לחוק המקרקעין): כל שותף רשאי בכל עת לדרוש פירוק שיתוף, ואין לוותר על זכות זו לתקופה העולה על 3 שנים. האח השלישי זכאי לדרוש פירוק, בעין או במכירה, ללא קשר לעמדתו בעניין פינוי הבינוי.","פינוי בינוי (חוק פינוי ובינוי): כאן ההכרעה היא ברמת הבניין כולו, ולא ברמת השיתוף הפנימי בין האחים. הרוב המיוחס (66%/60%/51%) הושג בבניין, ולכן ניתן לקדם את העסקה.","יש לבדוק אם לאח השלישי יש עילת סירוב צודק לפי ס' 2(ב) (אי-כדאיות כלכלית, חוסר בטוחות, נסיבות אישיות מיוחדות) – אם לא, סירובו עלול להיחשב בלתי סביר ולהקים אחריות נזיקית (ס' 2(א), שורצברגר).","שני ההליכים יכולים להתקיים במקביל: פירוק השיתוף בין האחים פנימי לדירה (יכריע מי מהם יישאר בעל הזכויות), בעוד שעסקת פינוי הבינוי תלויה בהסכמת הרוב המיוחס בבניין כולו ובבחינת סירובו של האח השלישי כלפי שאר דיירי הבניין."],
              src:["ס' 37, 39-40 חוק המקרקעין","סעיפים 1, 2(א), 2(ב) לחוק פינוי ובינוי, תשס\"ו-2006","ע\"א 3511/13 שורצברגר נ' מרין"]}
        },
        {id:"o6",num:6,keywords:[["חוק יחסי ממון","חוק יחסי ממון בין בני זוג"],["איזון משאבים","זכות לאיזון משאבים"],["סעיף 2(ב) לחוק פינוי ובינוי","ס' 2(ב)","עילת סירוב צודק"]],title:"חזקת שיתוף, חוק יחסי ממון ופינוי בינוי – תרחיש מורכב",diff:"קשה",
         text:"רונית ודוד נישאו ב-1980 (לאחר חוק יחסי ממון 1974) ורכשו דירה הרשומה על שם דוד בלבד. הם מתגוררים בבניין שעובר הליך פינוי בינוי, ורוב מיוחס של 70% מהדיירים הסכים לעסקה. דוד, ללא ידיעת רונית, סירב לעסקה בטענה לנסיבות אישיות. בנפרד, דוד ורונית נמצאים בהליכי גירושין. רונית טוענת לזכות במחצית הדירה מכוח חזקת השיתוף, ודוד טוען שמכוח חוק יחסי ממון אין לה זכות קניינית בדירה כל עוד לא בוצע איזון משאבים פורמלי. נתחו את שני הסכסוכים.",
         ans:{sum:"רונית אינה זכאית לזכות קניינית מיידית בדירה (רק לזכות עתידית לאיזון משאבים); ודוד, כבעלים הרשום היחיד, הוא זה שצריך להציג עילת סירוב צודק לפינוי הבינוי – אחרת עלול לחוב בנזיקין כלפי שאר הדיירים.",
              lines:["חוק יחסי ממון, תשל\"ג-1973 (חל על זוגות שנישאו אחרי 1974, כמו רונית ודוד): מקנה זכות לאיזון משאבים בעת פקיעת הנישואין בלבד – לא זכות קניינית מיידית בנכסים שנרכשו במהלך הנישואין. בכך נבדל ממצב 'חזקת השיתוף' שחל על זוגות שנישאו לפני 1974.","המשמעות: דוד, כבעלים הרשום היחיד של הדירה, הוא מי שצריך להחליט על עסקת פינוי הבינוי כלפי שאר דיירי הבניין; לרונית אין מעמד קנייני להתערב בהחלטה זו כלפי צדדים שלישיים, אף אם תהיה לה בעתיד זכות לאיזון משאבים בגירושין.","פינוי בינוי: הושג רוב מיוחס של 70% (עומד בדרישת 66% המינימלית). דוד, כדייר הסרבן, צריך להראות עילת סירוב צודק לפי ס' 2(ב) – אי-כדאיות, חוסר בטוחות, מגורים חלופיים, או נסיבות אישיות מיוחדות.","אם דוד לא יוכיח עילת סירוב צודק, סירובו עלול להיחשב בלתי סביר ולהקים אחריות נזיקית כלפי שאר הדיירים (ס' 2(א), הלכת שורצברגר) – וזאת בלי קשר לזכויותיה העתידיות של רונית באיזון המשאבים."],
              src:["חוק יחסי ממון בין בני זוג, תשל\"ג-1973","ע\"א 52/80 שחר נ' פרידמן","סעיפים 1, 2(א), 2(ב) לחוק פינוי ובינוי, תשס\"ו-2006","ע\"א 3511/13 שורצברגר נ' מרין"]}

          {title:"מקורות חלופיים להגנה בקניין רוחני (מצגת 22)",points:[
            {text:"גניבת עין (ס' 1 לחוק עוולות מסחריות): 'לא יגרום עוסק לכך שנכס שהוא מוכר, ייחשב בטעות כנכס של עוסק אחר.' על התובע להוכיח שני יסודות מצטברים: רכישת מוניטין וחשש להטעיית הציבור.",tags:[{t:"l",v:"סעיף 1 לחוק עוולות מסחריות"}]},
            {text:"דילול מוניטין: אינו דורש הוכחת חשש הטעיה, אך מחייב הוכחת שחיקה וטשטוש של המוניטין שרכש הסימן הרשום. כשקיים בידול בין המוצרים – אין מקום לדילול מוניטין.",tags:[]},
            {text:"דיני עשיית עושר כקטגוריה שיורית (א.ש.י.ר): יכולים להגן על יצרן מקורי גם ללא מדגם רשום. אין לשלול א-פריורית את תחולתם רק מפני שאין 'זכות ממוסדת'. היקף תחולתם תלוי בשאלה אם הדין הספציפי יוצר הסדר שלילי.",tags:[{t:"c",v:"רע\"א 5768/94 א.ש.י.ר יבוא יצור והפצה נ' פורום אביזרים"}]},
            {text:"כשנכשל התובע בהוכחת הפרת סימן מסחר רשום, אין מקום לסעד לפי עשיית עושר (דעת הרוב – חיות). דעת המיעוט (ריבלין): ניתן להכיר בעשיית עושר כשצרכן מודע שהמוצר הוא חיקוי ורוכשו בכוונה.",tags:[{t:"c",v:"ע\"א 563/11 Salomon Adidas נ' ג'לאל יאסין"}]},

          {title:"סימני מסחר – הגנה, הפרה ואופי מבחין (מצגת 22)",points:[
            {text:"סימן המסחר נועד לסייע לצרכן להבדיל בין מוצרים של סוחרים מתחרים. כדי שיהיה כשר לרישום עליו להיות בעל 'אופי מבחין' – מולד (אינהרנטי) או נרכש.",tags:[]},
            {text:"אופי מבחין מולד חלש מצדיק הגנה שתוגבל ככלל רק לסימן עצמו ולנגזרות הדומות לו מאוד. מתן מונופול על וריאציות בעייתי – מוציא את העיצוב מנחלת הכלל.",tags:[{t:"c",v:"ע\"א 563/11 Salomon Adidas נ' ג'לאל יאסין"}]},
            {text:"בסימן דומה (לא זהה): הטוען להפרה צריך להוכיח שהסימן האחר דומה לסימנו עד כדי הטעיית הציבור.",tags:[{t:"c",v:"ע\"א 563/11 Salomon Adidas נ' ג'לאל יאסין"}]},
            {text:"הפרת סימן מסחר 'שימוש הפוך' (אלוניאל): שימוש בסימן מסחר כדי להרחיק צרכנים מבעל הסימן הוא 'שימוש במוניטין לעלוב בבעליו'. היפוך זה אינו גורע מעצם ההפרה.",tags:[{t:"c",v:"ע\"א 8483/02 אלוניאל בע\"מ נ' אריאל מקדונלד"}]},
            {text:"הזכות לפרסום (אלוניאל): ביהמ\"ש הכיר בזכות לפרסום כזכות קניינית נפרדת, המקנה תביעה בדיני עשיית עושר. הבסיס: תיאוריית העבודה, האישיות, היעילות. בנסיבות המקרה – אין מקום להשבה שכן אלוניאל הגיבה לפרסום הביקורתי.",tags:[{t:"c",v:"ע\"א 8483/02 אלוניאל בע\"מ נ' אריאל מקדונלד"}]},
            {text:"עיצובים שלא נרשמו (קארשי): לעילת עשיית עושר בחיקוי עיצוב נדרש 'יסוד נוסף' שלילי. העדר ראיה על היקף ההשקעה ואי-רישום מדגם – אינם מקימים עילה.",tags:[{t:"c",v:"ע\"א 1898/12 מרכז המתנות 2006 בע\"מ נ' קארשי אינטרנשיונל"}]},

          {title:"זכויות יוצרים – שימוש הוגן ופרודיה (מצגת 22)",points:[
            {text:"פסד נספרסו (ע\"א 3425/17): פרסומת מתחרה עם כפיל של שחקן = שימוש הוגן. מדובר בפרודיה בעלת אופי שונה וחדשני. הפרסומות אינן משמשות תחליף האחת של השנייה.",tags:[{t:"c",v:"ע\"א 3425/17 Nestle Produits des Societe נ' אספרסו קלאב"},{t:"l",v:"סעיף 19 לחוק זכות יוצרים, תשס\"ח-2007"}]},
            {text:"ההכרה בפרודיה כ'שימוש הוגן' מכבדת את האדם כיוצר ומעניקה חירות לפיתוח אישי, לצד שמירה על היצירה כקניין – תוך מתן אפשרות של התקדמות ותחרות.",tags:[{t:"c",v:"ע\"א 3425/17 Nestle Produits des Societe נ' אספרסו קלאב"}]},

          {title:"נכסים דיגיטליים וטוקניזציה (מצגת 22)",points:[
            {text:"מושגי יסוד: Blockchain – מרשם מבוזר המתעד עסקאות. Smart Contract – קוד שמבצע פעולות אוטומטיות לפי תנאים. NFT/Token – רשומה דיגיטלית שמייצגת זכות. DAO – ארגון מבוזר המנוהל ע\"י קוד.",tags:[]},
            {text:"הבחנה מרכזית: Token ≠ Asset. Token = mechanism of legally mediated control. שליטה טכנולוגית אינה בהכרח בעלות. הבלוקצ'יין מחקה מוסדות קנייניים (טאבו ↔ ספר רישום; נאמן ↔ חוזה חכם) אך אינו מחליפם.",tags:[]},
            {text:"חסמים משפטיים לטוקניזציה של נדל\"ן: חוק המקרקעין ודרישת הכתב; בעיית המרשם הכפול. לא ניתן להעביר בעלות בדירה דרך טוקנים ללא רישום בטאבו.",tags:[{t:"l",v:"חוק המקרקעין"}]},
            {text:"ביקורת על 'קניין ללא חוק': חוזים חכמים מאפשרים ליצור זכויות שמתנהגות כמו קניין מבלי להסתמך על בתי משפט. הסיכונים: מניעת התערבות שיפוטית; פיצול לאלפי טוקנים עלול ליצור בעיית וטו.",tags:[]},

    });

// ---- Hebrew text normalization ----
// Strips quote-mark variants (gershayim/geresh/smart quotes), dashes and all other
// punctuation, collapses whitespace, and lowercases — so "ברקוביץ'" / "ברקוביץ\"" /
// "ברקוביץ" all normalize to the same comparable string.
function normalizeHe(s){
  return (s||"").toString()
    .replace(/[״"”“]/g,'"')                       // unify all double-quote/gershayim variants
    .replace(/[׳'’]/g,"'")                        // unify all single-quote/geresh variants
    .replace(/[\-–—]/g," ")                       // dashes become spaces ("תום-לב" -> "תום לב")
    .replace(/['"().,;:!?\[\]{}/\\]/g," ")         // strip remaining punctuation entirely
    .replace(/\s+/g," ")                          // collapse multiple spaces/newlines/tabs into one
    .trim()
    .toLowerCase();
}

// Loose key: additionally strips internal vav/yud letters, so common Hebrew
// full-vs-defective spelling variants ("סלומון" כתיב מלא vs "סלמון" כתיב חסר) collapse
// to the same key. Used only as a secondary fuzzy fallback, never for the primary check.
function looseHe(s){
  return normalizeHe(s).replace(/[וי]/g,"");
}

// Generic legal/grammatical scaffolding words. These appear inside many variants
// (e.g. "הלכת רוקר", "סעיף 14") but are meaningless on their own — without this list,
// a student writing ANY sentence containing the word "הלכת" or "סעיף" would falsely
// score a point for every checkpoint that happens to use that word. They are excluded
// from the word-level fallback check but the full-phrase check above is unaffected.
var GENERIC_LEGAL_WORDS=["הלכת","הלכה","עניין","פסד","פס","בגץ","סעיף","חוק","לחוק","חובת","חובה","זכות","זכויות","תקנת","תקנה","נגד","של","את","הוא","היא","אל","עם","על","לא","כן","יש","אין","או","גם","כי","הם","הן"];

function splitWords(s){
  return s.split(" ").filter(function(w){return w.length>0;});
}

// Builds, for one keyword variant, (a) its full normalized phrase and (b) the list of
// "distinctive" words inside it (length >= 3, not a generic scaffolding word, not a bare
// number) that are safe to match individually — e.g. for "רוקר נ' סלומון" this yields
// the distinctive words ["רוקר","סלומון"], letting a student who writes only the
// second name still score the point.
function variantSignature(variant){
  var phrase=normalizeHe(variant);
  var words=splitWords(phrase).filter(function(w){
    return w.length>=3 && GENERIC_LEGAL_WORDS.indexOf(w)===-1 && !/^\d+$/.test(w);
  });
  return{phrase:phrase,words:words};
}

function gradeAnswer(userText,keywords){
  var checkpoints=keywords||[];
  var cleanedInput=normalizeHe(userText);
  var inputWords=splitWords(cleanedInput);
  var inputLooseWords=splitWords(looseHe(userText));
  var found=[],missing=[];

  checkpoints.forEach(function(checkpoint){
    // Every checkpoint may be a single string or a nested array of acceptable variants
    // (e.g. full case name, short name, nickname). We must traverse ALL of them — never
    // just the first — using .some() so any single matching variant flags the checkpoint.
    var variations=Array.isArray(checkpoint)?checkpoint:[checkpoint];
    var official=variations[0];

    var hit=variations.some(function(variant){
      var sig=variantSignature(variant);
      if(sig.phrase==="")return false;

      // 1) Strict check: does the FULL normalized variant phrase appear anywhere
      //    inside the student's normalized answer?
      if(cleanedInput.includes(sig.phrase))return true;

      // 2) Word-level fallback: does any single distinctive word from this variant
      //    (e.g. just "סלומון" out of "רוקר נ' סלומון") appear as a whole word
      //    in the student's answer? This is what lets partial case-name fragments
      //    (a single party name) still count.
      if(sig.words.some(function(w){return inputWords.indexOf(w)!==-1;}))return true;

      // 3) Fuzzy fallback: same as (2) but tolerant of vav/yud spelling drift
      //    (כתיב מלא/חסר), so "סלמון" still matches the variant word "סלומון".
      return sig.words.some(function(w){
        var lw=w.replace(/[וי]/g,"");
        return lw.length>=2&&inputLooseWords.indexOf(lw)!==-1;
      });
    });

    if(hit)found.push(official);else missing.push(official);
  });

  var total=checkpoints.length;                 // dynamic — never hardcoded
  var pct=total?Math.round((found.length/total)*100):0;
  return{found:found,missing:missing,total:total,pct:pct};
}

function renderScoreBadge(res){
  if(!res.total)return"";
  var cls=res.pct>=70?"score-good":(res.pct>=40?"score-mid":"score-low");
  var icon=res.pct>=70?"✅":(res.pct>=40?"⚠️":"❌");
  return'<div class="scorebox '+cls+'"><div class="score-pct">'+icon+" "+res.pct+'%</div><div class="score-txt">זיהית '+res.found.length+" מתוך "+res.total+' מילות מפתח מרכזיות ('+res.pct+'%)</div></div>';
}

function renderCheckpointBlocks(res){
  if(!res||!res.total)return"";
  var h="";
  if(res.found.length){
    h+='<div class="cp-block cp-block-found"><div class="cp-block-title">✅ נקודות שזיהית בהצלחה</div><div class="cp-list">';
    h+=res.found.map(function(k){return'<div class="cp-item"><span class="cp-item-icon">✓</span><span>'+k+"</span></div>";}).join("");
    h+="</div></div>";
  }
  if(res.missing.length){
    h+='<div class="cp-block cp-block-missing"><div class="cp-block-title">🔍 נקודות שפספסת וכדאי לנסח מחדש</div><div class="cp-list">';
    h+=res.missing.map(function(k){return'<div class="cp-item"><span class="cp-item-icon">○</span><span>'+k+"</span></div>";}).join("");
    h+="</div></div>";
  }
  return h;
}

function renderFB(c){
  var m=c.ans;
  var bl=m.lines.map(function(l){return'<div class="brow"><div class="bdot" style="background:#b45309"></div><div class="btxt" style="font-size:.84rem">'+l+"</div></div>";}).join("");
  var sr=m.src.map(function(s){return'<span class="stag">'+s+"</span>";}).join("");
  var scoreHtml="",cpHtml="";
  var res=S.scores[c.id];
  if(res){scoreHtml=renderScoreBadge(res);cpHtml=renderCheckpointBlocks(res);}
  return'<div class="fbbox">'+scoreHtml+cpHtml+'<div class="fbh">📋 פתרון בית-ספר</div><div class="fbs"><h4>🎯 מסקנה עיקרית</h4><p style="font-weight:600">'+m.sum+'</p></div><div class="fbs"><h4>📖 ניתוח משפטי</h4>'+bl+'</div><div class="fbs" style="margin-bottom:0"><h4>📚 מקורות</h4>'+sr+"</div></div>";
}

function renderMedia(d){
  if(!d)return cs();
  var h='<div class="card" style="font-size:.84rem;color:#374151"><strong>🎧 ספריית מדיה \u2014 NotebookLM</strong><br><span style="color:#718096">פודקאסטים לסיכום שמיעתי של החומר, נושא בנושא.</span></div>';
  d.files.forEach(function(f){
    h+='<div class="acard"><div class="arow"><div class="athumb">🎧</div><div><div class="atitle">'+f.title+'</div><div class="adesc">'+f.desc+"</div></div></div>";
    if(f.file){
      h+='<a class="podlink" href="'+f.file+'" target="_blank" rel="noopener noreferrer">▶️ האזנה לפודקאסט</a>';
    }
    h+="</div>";
  });
  return h;
}

function cs(){
  var cat=DB.categories.find(function(c){return c.id===S.cat;});
  return'<div class="csoon"><div class="csicon">'+cat.icon+'</div><div class="cstitle">'+cat.label+'</div><div class="cssub">תוכן לנושא זה יתווסף בשלבים הבאים. ברגע שהנתונים יוזנו ל-DB, יופיעו כאן אוטומטית.</div><div class="csslides">'+cat.sub+"</div></div>";
}

function renderNav(){
  document.getElementById("nav-items").innerHTML=DB.categories.map(function(cat){
    return'<div class="nav-item'+(S.cat===cat.id?" active":"")+'" onclick="switchCat(\''+cat.id+'\')"><div class="nav-icon">'+cat.icon+'</div><div class="nav-txt"><div class="nav-label">'+cat.label+'</div><div class="nav-sub">'+cat.sub+"</div></div></div>";
  }).join("");
}

function renderContent(){
  var cat=DB.categories.find(function(c){return c.id===S.cat;});
  var cnt=DB.content[S.cat];
  var has=cnt&&cnt.study!==null;
  document.getElementById("hdr-eyebrow").textContent=cat.icon+" "+cat.sub;
  document.getElementById("hdr-title").textContent=cat.label;
  var sb=document.getElementById("hdr-status");
  sb.textContent="✅ תוכן זמין";
  sb.className="sbadge s-active";
  var html="";
  if(!has)html=cs();
  else if(S.tab==="study")html=renderStudy(cnt.study);
  else if(S.tab==="practice")html=renderPractice(cnt.practice);
  else html=renderMedia(cnt.media);
  document.getElementById("content-area").innerHTML=html;
}

function switchCat(id){S.cat=id;S.tab="study";document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.toggle("active",b.dataset.tab==="study");});renderNav();renderContent();closeSidebar();}
function switchTab(id){S.tab=id;document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.toggle("active",b.dataset.tab===id);});renderContent();}
function onAns(id,v){S.answers[id]=v;var btn=document.getElementById("btn-"+id);if(btn)btn.disabled=!v.trim();}
function checkAns(id){
  S.shown[id]=true;
  var cnt=DB.content[S.cat];
  var c=cnt&&cnt.practice&&cnt.practice.cases.find(function(x){return x.id===id;});
  if(c)S.scores[id]=gradeAnswer(S.answers[id]||"",c.keywords);
  renderContent();
}
function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("sidebar-overlay").classList.toggle("open");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("sidebar-overlay").classList.remove("open");}

renderNav();
renderContent();
